version: '3.8'

services:
  # Next.js Command Center App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: construction-app
    restart: always
    environment:
      DATABASE_URL: mysql://construction_user:secure_db_password@db:3306/construction_ai
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - production-network

  # MySQL Production Database
  db:
    image: mysql:8.0
    container_name: construction-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secure_root_password
      MYSQL_DATABASE: construction_ai
      MYSQL_USER: construction_user
      MYSQL_PASSWORD: secure_db_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-production-data:/var/lib/mysql
    networks:
      - production-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy (Web Server)
  nginx:
    image: nginx:alpine
    container_name: construction-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - production-network

  # Prometheus (Monitoring Metrics Scraper)
  prometheus:
    image: prom/prometheus:latest
    container_name: construction-prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - production-network

  # Grafana (Visual Analytical Dashboard)
  grafana:
    image: grafana/grafana:latest
    container_name: construction-grafana
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - production-network

volumes:
  mysql-production-data:
  grafana-storage:

networks:
  production-network:
    driver: bridge
